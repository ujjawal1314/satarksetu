# SatarkSetu - Docker Compose Configuration

services:
  neo4j:
    image: neo4j:5
    container_name: satarksetu-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-satarksetu2024}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-satarksetu2024} 'RETURN 1' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - satarksetu-network

  # Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: satarksetu-dashboard
    ports:
      - "8501:8501"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - BACKEND_URL=http://backend:8000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-satarksetu2024}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
    env_file:
      - .env
    volumes:
      - ./cyber_events.csv:/app/cyber_events.csv
      - ./transactions.csv:/app/transactions.csv
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - satarksetu-network

  # FastAPI Backend (optional)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: satarksetu-backend
    command: ["python", "backend.py"]
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-satarksetu2024}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
    env_file:
      - .env
    volumes:
      - ./cyber_events.csv:/app/cyber_events.csv
      - ./transactions.csv:/app/transactions.csv
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - satarksetu-network

networks:
  satarksetu-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:

# Usage:
# 1. Build and start: docker-compose up -d
# 2. View logs: docker-compose logs -f
# 3. Stop: docker-compose down
# 4. Rebuild: docker-compose up -d --build
#
# Access:
# - Dashboard: http://localhost:8501
# - Backend API: http://localhost:8000
# - API Docs: http://localhost:8000/docs
